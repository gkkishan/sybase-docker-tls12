services:
  dotnet-client:
    build:
      context: ./SybaseTlsClient
      dockerfile: Dockerfile
    container_name: sybase-dotnet-client
    ports:
      - "8080:8080"
    volumes:
      - ./certs/corporate-ca.crt:/opt/sap/certs/ca.crt:ro,Z
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
