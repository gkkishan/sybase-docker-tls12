# LOCAL DEV ONLY — spins up a local Sybase ASE + the .NET app
# For corporate use, see compose.corp.yml

services:
  sybase:
    build: .
    container_name: sybase-tls12
    hostname: sybase-server
    ports:
      - "5002:5000"
    volumes:
      - ./certs:/opt/sap/ASE-16_0/certificates:Z
      - sybase-data:/opt/sap/data:Z
    mem_limit: 2g
    privileged: true
    environment:
      - SYBASE=/opt/sap
      - SA_PASSWORD=sybase
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "source /opt/sap/SYBASE.sh && isql -Usa -Psybase -SDB_TEST -Q 'select 1' > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  dotnet-client:
    build:
      context: ./SybaseTlsClient
      dockerfile: Dockerfile
    container_name: sybase-dotnet-client
    ports:
      - "8080:8080"
    depends_on:
      sybase:
        condition: service_healthy
    volumes:
      - ./certs:/opt/sap/certs:ro
    environment:
      - SYBASE_CONNECTION_STRING=Driver={Sybase ODBC Driver};Server=sybase;Port=5000;Database=master;UID=sa;PWD=sybase;Encryption=ssl;TrustedFile=/opt/sap/certs/server.crt;
      - SYBASE_TLS_HOST=sybase
      - SYBASE_TLS_PORT=5000
      - SYBASE_CA_CERT=/opt/sap/certs/server.crt
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped

volumes:
  sybase-data:
